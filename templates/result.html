<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mensaje Revelado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .result-box { background-color: #1e1e1e; border: 1px solid #28a745; padding: 40px; border-radius: 10px; max-width: 600px; width: 100%; text-align: center; }
        .secret-text { color: #28a745; font-family: 'Courier New', monospace; font-size: 1.5rem; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="result-box shadow-lg">
        <h2 class="mb-4">🔓 ¡Mensaje Descifrado!</h2>
        
        <div class="alert alert-dark">
            <p class="mb-0 text-muted">El contenido oculto es:</p>
            <hr>
            <p class="secret-text">{{ mensaje }}</p>
        </div>

        <a href="/" class="btn btn-outline-light mt-4">Volver al Inicio</a>
    </div>

</body>
</html>
