{% extends "base.html" %}
{% block title%} Registro | Comunicaciones Invisibles {% endblock %}

{% block content %}
<div class="auth-container" style="position: relative; z-index: 10;">
    <div class="auth-card">

        <h2>Crear Cuenta</h2>

        <form action="{{ url_for('registro') }}" method="POST">
            
            <input type="text" name="username" placeholder="Nombre de usuario" required>
            <input type="email" name="email" placeholder="Correo electrónico" required>

            <div style="position: relative; margin-bottom: 20px;">
                <input type="password" name="password" id="pass-registro" placeholder="Contraseña" required
                    style="margin-bottom: 0; padding-right: 45px;">
                <button type="button" onclick="mostrarPassword('pass-registro')"
                    style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: #94A3B8; padding: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>

            <div style="position: relative; margin-bottom: 20px;">
                <input type="password" name="confirm_password" id="pass-confirm" placeholder="Confirma tu contraseña" required
                    style="margin-bottom: 0; padding-right: 45px;">
                <button type="button" onclick="mostrarPassword('pass-confirm')"
                    style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: #94A3B8; padding: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>

            <button type="submit" class="auth-btn" style="margin-top: 10px;">
                Registrarse
            </button>
        </form>

        <div class="auth-link">
            ¿Ya tienes cuenta?
            <a href="{{ url_for('login') }}">Inicia sesión</a>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function mostrarPassword(id) {
        const campo = document.getElementById(id);
        if (campo) {
            campo.type = campo.type === "password" ? "text" : "password";
        }
    }
</script>
{% endblock %}
