<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocultar Mensaje | Comunicaciones Invisibles</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <a href="{{ url_for('index') }}"> <img src="/logo2.png" style="width: 200px; height: 70px;" alt="Logo"></a>
        </div>
        
        <button class="menu-toggle" id="btn-menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <nav>
            <div class="nav-links" id="menu-links">
                <a href="{{ url_for('index') }}">Inicio</a>
                <a href="{{ url_for('ocultar') }}">Ocultar</a>
                <a href="{{ url_for('revelar') }}">Revelar</a>
                <a href="{{ url_for('login') }}">Login</a>
            </div>
        </nav>
    </div>

    <section class="section" style="position: relative; z-index: 10;">
        
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flask-alert">
            ⚠️ {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <h2 class="title-blue">Ocultar Información</h2>
        <p style="text-align: center; color: #64748B; margin-bottom: 10px;">Oculta datos en imágenes usando AES-256 + LSB</p>

        <div class="card">

            <form action="{{ url_for('index') }}" method="POST" enctype="multipart/form-data">

                <input type="hidden" name="action" value="ocultar">

                <label for="imgOriginal">1. Imagen Original (PNG)</label>

                <input type="file" id="imagen" name="imagen" accept=".png" required>

                <label for="txtMensaje">2. Mensaje Secreto</label>
                <textarea id="mensaje" name="mensaje" placeholder="Escribe aquí tu secreto..." required></textarea>

                <label for="passEnc">3. Contraseña (AES-256)</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Define una clave segura" required>
                    <button type="button" class="btn btn-blue" onclick="copiarTexto('passEnc')">
                        Copiar
                    </button>
                </div>

                <button type="submit" class="btn btn-blue" style="width: 100%; margin-top: 30px;">
                    Generar Imagen Segura
                </button>

            </form>

        </div>
    </section>

    <!-- FOOTER -->
    <footer style="text-align: center; padding: 30px 20px; color: #64748B; font-size: 14px; position: relative; z-index: 10;">
        Proyecto ITICS &copy; 2026 | Instituto Tecnológico de Tlalnepantla
    </footer>

    <!-- CANVAS FONDO -->
    <canvas id="bg-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></canvas>

    <!-- SCRIPTS -->
    <script>
        /*COPIAR CONTRASEÑA*/
        function copiarTexto(id){
            const campo = document.getElementById(id);
            if(campo && campo.value) {
                const originalType = campo.type;
                campo.type = 'text';
                campo.select();
                campo.setSelectionRange(0,99999);
                try {
                    document.execCommand('copy');
                    const btn = campo.nextElementSibling;
                    const originalText = btn.innerText;
                    btn.innerText = '¡Copiado!';
                    setTimeout(() => { btn.innerText = originalText; }, 1500);
                } catch(err) {}
                campo.type = originalType;
            }
        }

        /*LÓGICA DEL MENÚ HAMBURGUESA*/
        const btnMenu = document.getElementById('btn-menu');
        const menuLinks = document.getElementById('menu-links');
        if(btnMenu && menuLinks) {
            btnMenu.addEventListener('click', function() {
                menuLinks.classList.toggle('active'); 
            });
        }

        /*LÓGICA DE LA RED DE NODOS*/
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(event) { mouse.x = event.x; mouse.y = event.y; });
        window.addEventListener('mouseout', function() { mouse.x = undefined; mouse.y = undefined; });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX; this.y += this.directionY; this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 12000; 
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5; let directionY = (Math.random() * 1) - 0.5;
                let color = Math.random() > 0.5 ? 'rgba(30, 144, 255, 0.4)' : 'rgba(168, 85, 247, 0.4)';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 10) * (canvas.height / 10)) {
                        opacityValue = 1 - (distance / 10000);
                        ctx.strokeStyle = 'rgba(168, 85, 247,' + opacityValue * 0.2 + ')'; 
                        ctx.lineWidth = 1; ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                    }
                }
                if (mouse.x != null && mouse.y != null) {
                    let dx = particlesArray[a].x - mouse.x; let dy = particlesArray[a].y - mouse.y;
                    let distanceMouse = Math.sqrt(dx * dx + dy * dy);
                    if (distanceMouse < mouse.radius) {
                        ctx.beginPath(); ctx.strokeStyle = `rgba(30, 144, 255, ${1 - distanceMouse/mouse.radius})`; 
                        ctx.lineWidth = 1.5; ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate); ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); }
            connect();
        }

        window.addEventListener('resize', function() { canvas.width = innerWidth; canvas.height = innerHeight; init(); });
        init(); animate();
    </script>
</body>
</html>
